<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대시보드 - 카페 앱 관리자</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/admin/sidebar.css" />
  <link rel="stylesheet" href="/admin/index.css" />
</head>
<body>
  <a href="#main-content" class="skip-link">본문으로 바로가기</a>
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <h1>☕ 카페 앱 관리자</h1>
      <nav class="admin-sidebar-nav">
        <a href="/admin/index.html" class="active">대시보드</a>
        <a href="/admin/menus/list.html">메뉴 관리</a>
        <a href="/admin/categories/list.html">카테고리 관리</a>
        <a href="/admin/notices/list.html">공지 관리</a>
        <a href="/admin/events/list.html">이벤트 관리</a>
        <a href="/admin/orders/list.html">주문 관리</a>
      </nav>
      <div class="admin-sidebar-account">
        <span id="admin-name" class="admin-sidebar-name"></span>
        <button type="button" id="admin-logout-btn" class="admin-sidebar-logout">로그아웃</button>
      </div>
    </aside>

    <div class="admin-main">
      <main id="main-content" class="dashboard-page">
        <h2>대시보드</h2>

        <div class="stat-grid" id="stat-grid">
          <!-- index.js가 통계 카드를 렌더링 -->
        </div>

        <section class="featured-menus">
          <div class="section-heading">
            <h3>오늘의 추천 메뉴</h3>
            <a href="/admin/menus/list.html">메뉴 관리에서 편집 →</a>
          </div>
          <div class="featured-menus-list" id="featured-menus-list">
            <!-- index.js가 추천 메뉴 현황을 렌더링 -->
          </div>
        </section>

        <section class="recent-orders">
          <div class="section-heading">
            <h3>최근 주문</h3>
            <a href="/admin/orders/list.html">전체보기 →</a>
          </div>
          <div class="recent-orders-list" id="recent-orders-list">
            <!-- index.js가 최근 주문을 렌더링 -->
          </div>
        </section>
      </main>
    </div>
  </div>

  <script type="module" src="/admin/index.js"></script>
</body>
</html>
