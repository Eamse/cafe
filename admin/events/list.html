<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이벤트 관리 - 카페 앱 관리자</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/admin/sidebar.css" />
  <link rel="stylesheet" href="/admin/events/list.css" />
</head>
<body>
  <a href="#main-content" class="skip-link">본문으로 바로가기</a>
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <h1>☕ 카페 앱 관리자</h1>
      <nav class="admin-sidebar-nav">
        <a href="/admin/index.html">대시보드</a>
        <a href="/admin/menus/list.html">메뉴 관리</a>
        <a href="/admin/categories/list.html">카테고리 관리</a>
        <a href="/admin/notices/list.html">공지 관리</a>
        <a href="/admin/events/list.html" class="active">이벤트 관리</a>
        <a href="/admin/orders/list.html">주문 관리</a>
      </nav>
      <div class="admin-sidebar-account">
        <span id="admin-name" class="admin-sidebar-name"></span>
        <button type="button" id="admin-logout-btn" class="admin-sidebar-logout">로그아웃</button>
      </div>
    </aside>

    <div class="admin-main">
      <main id="main-content" class="admin-events-page">
        <div class="page-heading">
          <h2>이벤트 관리</h2>
          <p class="page-heading-sub">등록한 이벤트는 홈 화면과 이벤트 전체보기 페이지에 표시됩니다. 종료 처리하면 "종료된 이벤트입니다" 표시가 붙어요.</p>
        </div>

        <form id="event-form" class="event-form glass-card">
          <label class="form-field">
            <span>제목</span>
            <input type="text" id="event-title" required maxlength="40" />
          </label>
          <label class="form-field">
            <span>날짜</span>
            <input type="date" id="event-date" required />
          </label>
          <label class="form-field">
            <span>내용</span>
            <textarea id="event-description" rows="3" required maxlength="200"></textarea>
          </label>
          <label class="form-field">
            <span>이미지</span>
            <input type="file" id="event-image-file" accept="image/*" />
          </label>
          <div class="image-preview-row">
            <div class="image-preview" id="image-preview">미리보기</div>
            <div class="image-preview-info">
              <p class="image-preview-hint">사진을 선택하면 여기에 미리보기가 표시됩니다.</p>
              <button type="button" class="image-remove-btn" id="image-remove-btn" hidden>사진 제거</button>
            </div>
          </div>
          <p class="form-error" id="form-error" hidden></p>
          <button type="submit" class="btn btn-primary">이벤트 등록</button>
        </form>

        <div class="event-list" id="event-list">
          <!-- list.js가 이벤트 목록을 렌더링 -->
        </div>
      </main>
    </div>
  </div>

  <script type="module" src="/admin/events/list.js"></script>
</body>
</html>
