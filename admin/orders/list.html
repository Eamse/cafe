<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주문 관리 - 카페 앱 관리자</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/admin/sidebar.css" />
  <link rel="stylesheet" href="/admin/orders/list.css" />
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <h1>☕ 카페 앱 관리자</h1>
      <nav class="admin-sidebar-nav">
        <a href="/admin/index.html">대시보드</a>
        <a href="/admin/menus/list.html">메뉴 관리</a>
        <a href="/admin/categories/list.html">카테고리 관리</a>
        <a href="/admin/notices/list.html">공지 관리</a>
        <a href="/admin/events/list.html">이벤트 관리</a>
        <a href="/admin/orders/list.html" class="active">주문 관리</a>
      </nav>
    </aside>

    <div class="admin-main">
      <main class="admin-orders-page">
        <h2>주문 관리</h2>

        <input type="search" class="order-search" id="order-search" placeholder="주문번호, 수령자 이름/연락처로 검색" />

        <div class="status-tabs" id="status-tabs">
          <!-- list.js가 상태 탭을 렌더링 -->
        </div>

        <div class="order-select-bar">
          <label class="select-all-field">
            <input type="checkbox" id="select-all-checkbox" />
            <span>전체 선택</span>
          </label>
        </div>

        <div class="bulk-action-bar" id="bulk-action-bar" hidden>
          <span class="bulk-count" id="bulk-count"></span>
          <select class="status-select" id="bulk-status-select"></select>
          <button type="button" class="btn-bulk-apply" id="bulk-apply-btn">일괄 변경</button>
          <button type="button" class="btn-bulk-clear" id="bulk-clear-btn">선택 해제</button>
        </div>

        <div class="admin-order-list" id="admin-order-list">
          <!-- list.js가 주문 목록을 렌더링 -->
        </div>
      </main>
    </div>
  </div>

  <script type="module" src="/admin/orders/list.js"></script>
</body>
</html>
