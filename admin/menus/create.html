<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메뉴 추가 - 카페 앱 관리자</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/admin/sidebar.css" />
  <link rel="stylesheet" href="/admin/menus/create.css" />
</head>
<body>
  <a href="#main-content" class="skip-link">본문으로 바로가기</a>
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <h1>☕ 카페 앱 관리자</h1>
      <nav class="admin-sidebar-nav">
        <a href="/admin/index.html">대시보드</a>
        <a href="/admin/menus/list.html" class="active">메뉴 관리</a>
        <a href="/admin/categories/list.html">카테고리 관리</a>
        <a href="/admin/notices/list.html">공지 관리</a>
        <a href="/admin/events/list.html">이벤트 관리</a>
        <a href="/admin/orders/list.html">주문 관리</a>
      </nav>
      <div class="admin-sidebar-account">
        <span id="admin-name" class="admin-sidebar-name"></span>
        <button type="button" id="admin-logout-btn" class="admin-sidebar-logout">로그아웃</button>
      </div>
    </aside>

    <div class="admin-main">
  <main id="main-content" class="admin-form-page">
    <a class="back-link" href="/admin/menus/list.html">← 목록으로</a>
    <h2>메뉴 추가</h2>

    <form id="menu-form" class="menu-form glass-card">
      <label class="form-field">
        <span>메뉴명</span>
        <input type="text" id="name" required />
      </label>

      <label class="form-field">
        <span>카테고리</span>
        <select id="categoryId" required></select>
      </label>

      <label class="form-field">
        <span>가격</span>
        <input type="number" id="price" min="0" required />
      </label>

      <label class="form-field">
        <span>설명</span>
        <textarea id="description" rows="3"></textarea>
      </label>

      <label class="form-field">
        <span>이미지</span>
        <input type="file" id="image-file" accept="image/*" />
      </label>

      <div class="image-preview-row">
        <div class="image-preview" id="image-preview">미리보기</div>
        <div class="image-preview-info">
          <p class="image-preview-hint">사진을 선택하면 여기에 미리보기가 표시됩니다. 선택하지 않으면 기본 이미지 없이 등록돼요.</p>
          <button type="button" class="image-remove-btn" id="image-remove-btn" hidden>사진 제거</button>
        </div>
      </div>

      <label class="form-field-checkbox">
        <input type="checkbox" id="isSoldOut" />
        <span>품절 상태로 등록</span>
      </label>

      <div class="option-fields">
        <p class="option-fields-title">주문 옵션</p>
        <label class="form-field-checkbox">
          <input type="checkbox" id="hasTempOption" />
          <span>온도 옵션 사용 (아이스/핫)</span>
        </label>
        <label class="form-field-checkbox">
          <input type="checkbox" id="hasSizeOption" />
          <span>사이즈 옵션 사용 (레귤러/라지)</span>
        </label>
        <label class="form-field" id="size-upcharge-field" hidden>
          <span>라지 사이즈 추가 금액</span>
          <input type="number" id="sizeUpcharge" min="0" value="0" />
        </label>
      </div>

      <p class="form-error" id="form-error" hidden></p>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">저장</button>
        <a class="btn btn-cancel" href="/admin/menus/list.html">취소</a>
      </div>
    </form>
  </main>
    </div>
  </div>

  <script type="module" src="/admin/menus/create.js"></script>
</body>
</html>
