<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메뉴 관리 - 카페 앱 관리자</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/admin/sidebar.css" />
  <link rel="stylesheet" href="/admin/menus/list.css" />
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <h1>☕ 카페 앱 관리자</h1>
      <nav class="admin-sidebar-nav">
        <a href="/admin/index.html">대시보드</a>
        <a href="/admin/menus/list.html" class="active">메뉴 관리</a>
        <a href="/admin/categories/list.html">카테고리 관리</a>
        <a href="/admin/notices/list.html">공지 관리</a>
        <a href="/admin/events/list.html">이벤트 관리</a>
        <a href="/admin/orders/list.html">주문 관리</a>
      </nav>
    </aside>

    <div class="admin-main">
      <main class="admin-menus-page">
        <div class="page-heading">
          <h2>메뉴 관리</h2>
          <a class="btn btn-primary" href="/admin/menus/create.html">+ 메뉴 추가</a>
        </div>

        <input type="search" class="menu-name-search" id="menu-name-search" placeholder="메뉴명 검색" />

        <div class="category-tabs" id="category-tabs">
          <!-- list.js가 카테고리 탭을 렌더링 -->
        </div>

        <div class="order-select-bar">
          <label class="select-all-field">
            <input type="checkbox" id="select-all-checkbox" />
            <span>전체 선택</span>
          </label>
        </div>

        <div class="bulk-action-bar" id="bulk-action-bar" hidden>
          <span class="bulk-count" id="bulk-count"></span>
          <button type="button" class="btn-bulk-apply" data-bulk-action="soldout">일괄 품절 처리</button>
          <button type="button" class="btn-bulk-apply" data-bulk-action="available">일괄 판매중 전환</button>
          <button type="button" class="btn-bulk-delete" data-bulk-action="delete">일괄 삭제</button>
          <button type="button" class="btn-bulk-clear" id="bulk-clear-btn">선택 해제</button>
        </div>

        <div class="admin-menu-list" id="admin-menu-list">
          <!-- list.js가 메뉴 목록을 렌더링 -->
        </div>
      </main>
    </div>
  </div>

  <script type="module" src="/admin/menus/list.js"></script>
</body>
</html>
