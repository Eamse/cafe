<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주문 내역 - 카페 앱</title>
  <script>
        document.documentElement.dataset.theme = localStorage.getItem("cafe_theme") || "dark";
      </script>
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../orders/list.css" />
</head>
<body>
  <a href="#main-content" class="skip-link">본문으로 바로가기</a>
  <header class="orders-header">
    <h1><a href="../index.html">☕ 카페 앱</a></h1>
    <button type="button" class="nav-toggle-btn" id="nav-toggle-btn" aria-label="메뉴 열기" aria-expanded="false">☰</button>
    <nav class="home-nav">
      <a href="../index.html">홈</a>
      <a href="../menus/list.html">메뉴</a>
      <a href="../orders/list.html" class="active">주문내역</a>
      <a href="../my/index.html">마이페이지</a>
    </nav>
    <div class="header-actions">
            <button type="button" class="theme-toggle-btn" id="theme-toggle-btn" aria-label="테마 전환"></button>
            <div id="auth-nav" class="auth-nav"></div>
<a class="hotline" href="tel:0212345678">📞 02-1234-5678</a>
      <a href="../basket/list.html" class="cart-link">
        장바구니
        <span class="cart-badge" id="cart-badge" hidden>0</span>
      </a>
    </div>

  <main id="main-content" class="orders-page">
    <section class="home-recent" id="home-recent-section" hidden>
      <div class="section-heading">
        <h2>다시 담아보세요</h2>
      </div>
      <div class="recent-order-row" id="recent-order-row">
        <!-- list.js가 최근 주문 메뉴를 렌더링 -->
      </div>
    </section>

    <h2>주문 내역</h2>
    <div class="orders-list" id="orders-list">
      <!-- list.js가 주문 내역을 렌더링 -->
    </div>
  </main>

  <script type="module" src="../orders/list.js"></script>
</body>
</html>
