<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이벤트 - 카페 앱</title>
  <script>
    document.documentElement.dataset.theme = localStorage.getItem("cafe_theme") || "dark";
  </script>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/events/list.css" />
</head>
<body>
  <header class="events-header">
    <h1><a href="/index.html">☕ 카페 앱</a></h1>
    <nav class="home-nav">

    <div class="header-actions">

  <main class="events-page">

    <p class="events-page-sub">지금까지 진행한 모든 이벤트를 확인할 수 있어요.</p>
    <ul class="event-list" id="event-list">

    </ul>
  </main>

  <script type="module" src="/events/list.js"></script>

</html>
