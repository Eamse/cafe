<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>카페 앱</title>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/cart-panel.css" />
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <header class="home-header">
    <h1>☕ 카페 앱</h1>
    <nav class="home-nav">
      <a href="my/index.html">마이페이지</a>
      <a href="basket/list.html" class="cart-link">
        장바구니
        <span class="cart-badge" id="cart-badge" hidden>0</span>
      </a>
    </nav>
  </header>

  <section class="home-hero">
    <div class="hero-overlay">
      <h2>오늘도 좋은 하루,<br />커피 한 잔 어때요?</h2>
      <p>신선한 원두로 내린 커피와 디저트를 만나보세요.</p>
    </div>
  </section>

  <section class="home-featured">
    <div class="section-heading">
      <h2>오늘의 추천</h2>
    </div>
    <div class="featured-row" id="featured-row">
      <!-- index.js가 카테고리별 추천 메뉴를 렌더링 -->
    </div>
  </section>

  <main class="home-menu-section">
    <div class="section-heading">
      <h2>전체 메뉴</h2>
    </div>

    <div class="category-tabs" id="category-tabs">
      <!-- index.js가 카테고리 탭을 렌더링 -->
    </div>

    <div class="menu-grid" id="menu-grid">
      <!-- index.js가 메뉴 데이터를 렌더링 -->
    </div>
  </main>

  <section class="home-info">
    <div class="info-card">
      <h3>매장 안내</h3>
      <p>서울 어딘가 카페거리 12길 3 · 매일 09:00 - 22:00</p>
      <p>전화 문의 02-1234-5678</p>
    </div>
  </section>

  <footer class="home-footer">
    <div class="footer-brand">
      <div class="footer-logo">☕ 카페 앱</div>
      <p>매일 신선하게 내린 커피와 디저트로 하루를 채워드립니다.</p>
    </div>
    <div class="footer-links">
      <h4>바로가기</h4>
      <a href="orders/list.html">주문 내역</a>
      <a href="my/index.html">마이페이지</a>
      <a href="admin/index.html">관리자</a>
    </div>
    <div class="footer-sns">
      <h4>팔로우하기</h4>
      <div class="sns-icons">
        <span>IG</span>
        <span>FB</span>
        <span>YT</span>
      </div>
    </div>
    <div class="footer-copyright">© 2026 카페 앱. All rights reserved.</div>
  </footer>

  <script type="module" src="index.js"></script>
</body>
</html>
