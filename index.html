<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>카페 앱</title>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <header class="home-header">
    <h1>☕ 카페 앱</h1>
    <nav class="main-nav">
      <a href="index.html">홈</a>
      <a href="menus/list.html">메뉴</a>
      <a href="basket/list.html" class="nav-cart">장바구니<span class="cart-badge" id="cart-badge"></span></a>
      <a href="orders/list.html">주문내역</a>
      <a href="my/index.html">마이페이지</a>
    </nav>
  </header>

  <section class="home-hero">
    <h2>오늘도 좋은 하루,<br />커피 한 잔 어때요?</h2>
    <p>신선한 원두로 내린 커피와 디저트를 만나보세요.</p>
  </section>

  <main class="home-menu-section">
    <div class="menu-section-heading">
      <h2>메뉴</h2>
      <select class="sort-select" id="sort-select">
        <option value="default">기본순</option>
        <option value="price-asc">가격 낮은순</option>
        <option value="price-desc">가격 높은순</option>
        <option value="name">이름순</option>
      </select>
    </div>
    <div class="category-tabs" id="category-tabs">
      <!-- index.js가 카테고리 탭을 렌더링 -->
    </div>
    <div class="menu-grid" id="menu-grid">
      <!-- js/data.js의 메뉴 데이터를 index.js가 여기에 렌더링 -->
    </div>
  </main>

  <script type="module" src="index.js"></script>
</body>
</html>
