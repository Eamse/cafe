<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메뉴 - 카페 앱</title>
  <script>
        document.documentElement.dataset.theme = localStorage.getItem("cafe_theme") || "dark";
      </script>
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/cart-panel.css" />
  <link rel="stylesheet" href="../menus/list.css" />
</head>
<body>
  <a href="#main-content" class="skip-link">본문으로 바로가기</a>
  <header class="menu-header">
    <h1><a href="../index.html">☕ 카페 앱</a></h1>
    <button type="button" class="nav-toggle-btn" id="nav-toggle-btn" aria-label="메뉴 열기" aria-expanded="false">☰</button>
    <nav class="home-nav">
      <a href="../index.html">홈</a>
      <a href="../menus/list.html" class="active">메뉴</a>
      <a href="../orders/list.html">주문내역</a>
      <a href="../my/index.html">마이페이지</a>
    </nav>
    <div class="header-actions">
            <button type="button" class="theme-toggle-btn" id="theme-toggle-btn" aria-label="테마 전환"></button>
            <div id="auth-nav" class="auth-nav"></div>
      <a href="../basket/list.html" class="cart-link">
        장바구니
        <span class="cart-badge" id="cart-badge" hidden>0</span>
      </a>
    </div>
  </header>

  <section class="home-usp">
    <div class="usp-item">
      <h3>매일 로스팅</h3>
      <p>매장에서 매일 신선하게 로스팅한 원두만 사용해요.</p>
    </div>
    <div class="usp-item">
      <h3>빠른 픽업</h3>
      <p>미리 담아두고 매장에서 바로 픽업할 수 있어요.</p>
    </div>
    <div class="usp-item">
      <h3>간편한 주문</h3>
      <p>메뉴를 눌러서 담고, 몇 번의 클릭으로 주문 끝.</p>
    </div>
  </section>

  <section class="home-recent" id="home-recent-section" hidden>
    <div class="section-heading">
      <h2>다시 담아보세요</h2>
    </div>
    <div class="recent-order-row" id="recent-order-row">
      <!-- list.js가 최근 주문 메뉴를 렌더링 -->
    </div>
  </section>

  <main id="main-content" class="menu-list-page">
    <div class="section-heading">
      <h2>메뉴 <span class="menu-count" id="menu-count"></span></h2>
      <div class="menu-controls">
        <div class="search-wrap">
          <input type="search" id="menu-search" class="menu-search" placeholder="메뉴 검색" autocomplete="off" />
          <div class="search-suggestions" id="search-suggestions" hidden></div>
        </div>
        <button type="button" id="favorites-toggle" class="favorites-toggle" aria-pressed="false">
          ♥ 즐겨찾기만
        </button>
        <select class="price-filter" id="price-filter">
          <option value="all">전체 가격</option>
          <option value="under5000">5,000원 이하</option>
          <option value="5000to6000">5,000~6,000원</option>
          <option value="over6000">6,000원 이상</option>
        </select>
        <select class="sort-select" id="sort-select">
          <option value="default">기본순</option>
          <option value="price-asc">가격 낮은순</option>
          <option value="price-desc">가격 높은순</option>
          <option value="name">이름순</option>
        </select>
      </div>
    </div>
    <div class="recent-searches" id="recent-searches" hidden>
      <!-- list.js가 최근 검색어 칩을 렌더링 -->
    </div>
    <div class="category-tabs" id="category-tabs">
      <!-- list.js가 카테고리 탭을 렌더링 -->
    </div>
    <div class="menu-grid" id="menu-grid">
      <!-- js/data.js의 메뉴 데이터를 list.js가 여기에 렌더링 -->
    </div>
  </main>

  <script type="module" src="../menus/list.js"></script>
</body>
</html>
