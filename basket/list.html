<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장바구니 - 카페 앱</title>
  <script>
        document.documentElement.dataset.theme = localStorage.getItem("cafe_theme") || "dark";
      </script>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/basket/list.css" />
</head>
<body>
  <a href="#main-content" class="skip-link">본문으로 바로가기</a>
  <header class="basket-header">
    <h1><a href="/index.html">☕ 카페 앱</a></h1>
    <nav class="home-nav">
      <a href="/index.html">홈</a>
      <a href="/menus/list.html">메뉴</a>
      <a href="/orders/list.html">주문내역</a>
      <a href="/my/index.html">마이페이지</a>
    </nav>
    <div class="header-actions">
            <button type="button" class="theme-toggle-btn" id="theme-toggle-btn" aria-label="테마 전환"></button>
            <div id="auth-nav" class="auth-nav"></div>
<a class="hotline" href="tel:0212345678">📞 02-1234-5678</a>
      <a href="/basket/list.html" class="cart-link active">
        장바구니
        <span class="cart-badge" id="cart-badge" hidden>0</span>
      </a>
    </div>
  </header>

  <main id="main-content" class="basket-page">
    <h2>장바구니</h2>
    <div class="basket-list" id="basket-list">
      <!-- localStorage 카트 데이터를 list.js가 여기에 렌더링 -->
    </div>
    <p class="pickup-estimate" id="pickup-estimate" hidden></p>

    <fieldset class="delivery-type-fields">
      <legend>수령 방법</legend>
      <label class="delivery-type-option">
        <input type="radio" name="deliveryType" id="delivery-type-pickup" value="pickup" checked />
        <span>매장 수령</span>
      </label>
      <label class="delivery-type-option">
        <input type="radio" name="deliveryType" id="delivery-type-delivery" value="delivery" />
        <span>배달</span>
      </label>
    </fieldset>

    <fieldset class="recipient-fields">
      <legend>수령 정보</legend>
      <label class="form-field">
        <span>수령자 이름 *</span>
        <input type="text" id="recipient-name" required maxlength="20" placeholder="홍길동" />
      </label>
      <label class="form-field">
        <span>연락처 *</span>
        <input type="tel" id="recipient-phone" required maxlength="20" placeholder="010-1234-5678" />
      </label>
      <label class="form-field" id="recipient-address-field">
        <span id="recipient-address-label">배달 주소 *</span>
        <input type="text" id="recipient-address" required maxlength="100" placeholder="배송받으실 주소" />
      </label>
    </fieldset>

    <label class="order-note-field">
      <span>요청사항 (선택)</span>
      <textarea id="order-note" rows="2" maxlength="200" placeholder="예: 얼음 적게 주세요, 빨대는 빼주세요"></textarea>
    </label>

    <p class="basket-warning" id="basket-warning" hidden></p>
    <div class="basket-total" id="basket-total"></div>
    <button type="button" class="checkout-btn" id="checkout-btn">주문하기</button>
  </main>

  <script type="module" src="/basket/list.js"></script>
</body>
</html>
